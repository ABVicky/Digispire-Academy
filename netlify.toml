[build]
  # The directory to change to before starting a build.
  # This is where your package.json is located.
  base = "digispire-app"

  # The command to run to build your project
  command = "npm install && npm run build"

  # The directory that contains the deploy-ready HTML files and assets
  # This is relative to the 'base' directory.
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  # This redirect rule is necessary for Single Page Applications (SPA) 
  # to handle client-side routing properly.
  from = "/*"
  to = "/index.html"
  status = 200
